<html lang="en">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>InterviewX — AI Technical Interviews</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Syne:wght@600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.12.7/Recharts.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.10/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0b0e14;
      --bg2: #111520;
      --card: #131820;
      --card2: #181f2e;
      --border: #1e2535;
      --border2: #252d3f;
      --primary: #00e07a;
      --primary-dim: rgba(0,224,122,0.12);
      --primary-glow: rgba(0,224,122,0.25);
      --fg: #e8ecf4;
      --fg2: #9ba8c0;
      --fg3: #5a6580;
      --emerald: #34d399;
      --amber: #fbbf24;
      --rose: #f87171;
      --blue: #38bdf8;
      --purple: #a78bfa;
      --radius: 12px;
      --radius-sm: 8px;
    }

    html, body { background: var(--bg); color: var(--fg); font-family: 'DM Sans', sans-serif; min-height: 100vh; }

    body {
      background-image:
        radial-gradient(ellipse 80% 50% at 50% -10%, rgba(0,224,122,0.07) 0%, transparent 70%),
        radial-gradient(ellipse 60% 40% at 80% 90%, rgba(56,189,248,0.04) 0%, transparent 60%);
    }

    #root { display: flex; flex-direction: column; min-height: 100vh; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

    /* Typography */
    .font-display { font-family: 'Syne', sans-serif; }
    .font-mono { font-family: 'JetBrains Mono', monospace; }

    /* Grid background */
    .grid-bg {
      background-image: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.2;
    }

    /* Animations */
    @keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }
    @keyframes ping { 0% { transform:scale(1); opacity:0.8; } 100% { transform:scale(2); opacity:0; } }
    @keyframes spin { to { transform:rotate(360deg); } }
    @keyframes shimmer { 0% { background-position:-200% center; } 100% { background-position:200% center; } }
    @keyframes slideDown { from { opacity:0; transform:translateY(-8px); } to { opacity:1; transform:translateY(0); } }

    .fade-up { animation: fadeUp 0.35s ease-out forwards; }
    .spin { animation: spin 1s linear infinite; }

    /* Buttons */
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      border-radius: var(--radius-sm); font-size: 14px; font-weight: 600;
      cursor: pointer; transition: all 0.15s; border: none; white-space: nowrap;
      font-family: inherit; line-height: 1;
    }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn:active:not(:disabled) { transform: scale(0.97); }

    .btn-primary {
      background: var(--primary); color: #000; padding: 10px 20px;
      box-shadow: 0 0 20px var(--primary-glow);
    }
    .btn-primary:hover:not(:disabled) { background: #00f587; box-shadow: 0 0 30px rgba(0,224,122,0.4); }

    .btn-outline {
      background: transparent; color: var(--fg); padding: 10px 20px;
      border: 1px solid var(--border2);
    }
    .btn-outline:hover:not(:disabled) { background: var(--card2); border-color: var(--border2); }

    .btn-ghost { background: transparent; color: var(--fg2); padding: 8px 14px; }
    .btn-ghost:hover:not(:disabled) { background: var(--card); color: var(--fg); }

    .btn-danger { background: rgba(248,113,113,0.15); color: var(--rose); border: 1px solid rgba(248,113,113,0.3); padding: 10px; }
    .btn-danger:hover:not(:disabled) { background: rgba(248,113,113,0.25); }

    .btn-icon { width: 42px; height: 42px; padding: 0; border-radius: var(--radius-sm); }
    .btn-sm { padding: 7px 14px; font-size: 13px; }
    .btn-lg { padding: 13px 28px; font-size: 15px; border-radius: var(--radius); }

    /* Inputs */
    input, textarea {
      background: rgba(255,255,255,0.04); border: 1px solid var(--border2);
      border-radius: var(--radius-sm); color: var(--fg); font-family: inherit;
      font-size: 14px; padding: 10px 14px; width: 100%; outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    input:focus, textarea:focus {
      border-color: var(--primary); box-shadow: 0 0 0 3px rgba(0,224,122,0.1);
    }
    input::placeholder, textarea::placeholder { color: var(--fg3); }
    textarea { resize: none; }

    /* Cards */
    .card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); overflow: hidden;
    }
    .card-hover { transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s; }
    .card-hover:hover { border-color: rgba(0,224,122,0.25); transform: translateY(-2px); box-shadow: 0 8px 30px rgba(0,224,122,0.06); }

    /* Badges */
    .badge {
      display: inline-flex; align-items: center; padding: 3px 8px;
      border-radius: 6px; font-size: 11px; font-weight: 600; border: 1px solid;
    }
    .badge-primary { background: var(--primary-dim); color: var(--primary); border-color: rgba(0,224,122,0.3); }
    .badge-secondary { background: var(--card2); color: var(--fg2); border-color: var(--border2); }
    .badge-outline { background: transparent; color: var(--fg); border-color: var(--border2); }
    .badge-emerald { background: rgba(52,211,153,0.1); color: var(--emerald); border-color: rgba(52,211,153,0.3); }
    .badge-amber { background: rgba(251,191,36,0.1); color: var(--amber); border-color: rgba(251,191,36,0.3); }
    .badge-rose { background: rgba(248,113,113,0.1); color: var(--rose); border-color: rgba(248,113,113,0.3); }

    /* Labels */
    label { font-size: 13px; font-weight: 500; color: var(--fg2); display: block; margin-bottom: 6px; }
    .label-xs { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--fg3); }

    /* Progress bar */
    .progress-bar { background: var(--card2); border-radius: 999px; overflow: hidden; height: 4px; }
    .progress-fill { background: var(--primary); border-radius: 999px; height: 100%; transition: width 0.5s ease; }

    /* Separator */
    .sep { height: 1px; background: var(--border); }

    /* Toast */
    .toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; width: 320px; }
    .toast {
      background: var(--card); border: 1px solid var(--border2); border-radius: var(--radius);
      padding: 14px 16px; box-shadow: 0 8px 30px rgba(0,0,0,0.4); animation: slideDown 0.25s ease-out;
      cursor: pointer; position: relative; overflow: hidden;
    }
    .toast-title { font-size: 13px; font-weight: 600; margin-bottom: 2px; }
    .toast-desc { font-size: 12px; color: var(--fg2); }
    .toast-error { border-color: rgba(248,113,113,0.4); background: rgba(248,113,113,0.08); }
    .toast-error .toast-title { color: var(--rose); }
    .toast-bar { position: absolute; bottom: 0; left: 0; height: 2px; background: var(--primary); width: 100%; transform-origin: left; animation: shimmer 4s ease forwards; }

    /* Navbar */
    .navbar {
      position: sticky; top: 0; z-index: 100;
      background: rgba(11,14,20,0.85); backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
    }
    .navbar-inner { max-width: 1200px; margin: 0 auto; padding: 0 24px; height: 64px; display: flex; align-items: center; justify-content: space-between; }
    .nav-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; color: var(--fg); }
    .logo-box { width: 34px; height: 34px; background: var(--primary); border-radius: 8px; display: grid; place-items: center; box-shadow: 0 0 16px var(--primary-glow); }
    .logo-text { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 700; }
    .logo-x { color: var(--primary); }
    .nav-links { display: flex; gap: 2px; }
    .nav-link { padding: 7px 14px; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; color: var(--fg2); transition: all 0.15s; border: none; background: none; font-family: inherit; }
    .nav-link:hover { color: var(--fg); background: var(--card); }
    .nav-link.active { color: var(--fg); background: var(--card2); }

    /* Layout */
    .page { max-width: 1100px; margin: 0 auto; padding: 48px 24px; }
    .page-sm { max-width: 700px; margin: 0 auto; padding: 64px 24px; }
    .page-xs { max-width: 440px; margin: 0 auto; padding: 80px 24px; }

    /* Grid */
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
    .col-span-2 { grid-column: span 2; }

    @media (max-width: 768px) {
      .grid-2, .grid-3 { grid-template-columns: 1fr; }
      .col-span-2 { grid-column: span 1; }
      .hide-mobile { display: none !important; }
      .nav-links { display: none; }
      .page { padding: 24px 16px; }
    }

    /* Specific components */
    .hero-chip { display: inline-flex; align-items: center; gap: 8px; padding: 6px 14px; border-radius: 999px; border: 1px solid rgba(0,224,122,0.3); background: rgba(0,224,122,0.06); color: var(--primary); font-size: 12px; font-weight: 600; margin-bottom: 28px; }
    .hero-title { font-family: 'Syne', sans-serif; font-size: clamp(40px, 7vw, 72px); font-weight: 800; line-height: 1.05; letter-spacing: -0.02em; }
    .text-primary { color: var(--primary); }
    .text-fg2 { color: var(--fg2); }
    .text-fg3 { color: var(--fg3); }
    .text-emerald { color: var(--emerald); }
    .text-amber { color: var(--amber); }
    .text-rose { color: var(--rose); }
    .text-blue { color: var(--blue); }

    /* Score ring */
    .score-ring { position: relative; width: 120px; height: 120px; }
    .score-ring svg { transform: rotate(-90deg); }

    /* Interview chat */
    .chat-scroll { flex: 1; overflow-y: auto; border-radius: var(--radius); border: 1px solid var(--border); background: rgba(13,18,28,0.5); padding: 20px; display: flex; flex-direction: column; gap: 24px; min-height: 0; }
    .turn-ai { display: flex; gap: 12px; }
    .turn-you { display: flex; gap: 12px; padding-left: 44px; }
    .avatar { width: 32px; height: 32px; border-radius: 8px; display: grid; place-items: center; flex-shrink: 0; }
    .avatar-ai { background: rgba(0,224,122,0.15); color: var(--primary); }
    .avatar-you { background: var(--card2); color: var(--fg2); }
    .bubble { flex: 1; border-radius: var(--radius-sm); padding: 14px 16px; border: 1px solid var(--border); background: rgba(255,255,255,0.02); }
    .bubble-live { background: rgba(0,224,122,0.04); border-color: rgba(0,224,122,0.2); }

    /* Score pills */
    .score-pill { display: inline-flex; align-items: center; gap: 5px; padding: 3px 8px; border-radius: 6px; font-size: 11px; border: 1px solid; }
    .pill-green { background: rgba(52,211,153,0.08); border-color: rgba(52,211,153,0.25); }
    .pill-amber { background: rgba(251,191,36,0.08); border-color: rgba(251,191,36,0.25); }
    .pill-red { background: rgba(248,113,113,0.08); border-color: rgba(248,113,113,0.25); }

    /* Pressure buttons */
    .pressure-btn { border: 1px solid var(--border2); border-radius: var(--radius-sm); padding: 10px 12px; cursor: pointer; text-align: left; transition: all 0.15s; background: rgba(255,255,255,0.02); }
    .pressure-btn:hover { border-color: rgba(0,224,122,0.3); }
    .pressure-btn.selected { border-color: var(--primary); background: var(--primary-dim); box-shadow: 0 0 12px rgba(0,224,122,0.15); }

    /* Duration buttons */
    .dur-btn { border: 1px solid var(--border2); border-radius: var(--radius-sm); padding: 10px; cursor: pointer; text-align: center; font-weight: 600; font-size: 13px; transition: all 0.15s; background: rgba(255,255,255,0.02); color: var(--fg2); }
    .dur-btn:hover { border-color: rgba(0,224,122,0.3); color: var(--fg); }
    .dur-btn.selected { border-color: var(--primary); background: var(--primary-dim); color: var(--fg); box-shadow: 0 0 12px rgba(0,224,122,0.15); }

    /* Section card */
    .section-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; }
    .section-icon { width: 30px; height: 30px; border-radius: 8px; display: grid; place-items: center; margin-bottom: 12px; }

    /* Stats */
    .stat-value { font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 700; color: var(--primary); }
    .stat-label { font-size: 11px; color: var(--fg3); margin-top: 2px; }

    /* Feature card */
    .feature-icon-box { width: 40px; height: 40px; border-radius: 10px; background: rgba(0,224,122,0.1); display: grid; place-items: center; margin-bottom: 14px; color: var(--primary); }

    /* Record row */
    .record-row { padding: 18px 20px; display: flex; align-items: center; gap: 16px; border-bottom: 1px solid var(--border); transition: background 0.15s; }
    .record-row:last-child { border-bottom: none; }
    .record-row:hover { background: rgba(255,255,255,0.02); }

    /* Timer */
    .timer { display: flex; align-items: center; gap: 6px; padding: 7px 14px; border-radius: 8px; border: 1px solid var(--border2); font-family: 'JetBrains Mono', monospace; font-size: 14px; font-weight: 500; }
    .timer.critical { border-color: rgba(248,113,113,0.4); color: var(--rose); background: rgba(248,113,113,0.06); }

    /* Tooltip-like tags for report breakdown */
    .breakdown-box { border: 1px solid var(--border2); border-radius: var(--radius-sm); padding: 10px 14px; background: rgba(255,255,255,0.02); }

    /* Step indicator */
    .step-num { width: 28px; height: 28px; border-radius: 8px; background: var(--primary-dim); border: 1px solid rgba(0,224,122,0.3); color: var(--primary); display: grid; place-items: center; font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 600; flex-shrink: 0; }

    /* Transcript accordion */
    .transcript-row { border: 1px solid var(--border); border-radius: var(--radius-sm); overflow: hidden; margin-bottom: 8px; }
    .transcript-header { padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; transition: background 0.15s; }
    .transcript-header:hover { background: rgba(255,255,255,0.03); }
    .transcript-body { padding: 12px 16px; border-top: 1px solid var(--border); background: rgba(0,0,0,0.2); }

    /* Inline SVG icons */
    svg.icon { display: inline-block; vertical-align: middle; }
  </style>
</head>

const delay = ms => new Promise(r => setTimeout(r, ms));
let ivCounter = 1, repCounter = 1;

const QUESTIONS = [
  "Walk me through the overall architecture of this project. What are the main components and how do they communicate?",
  "How does the routing and request handling work? What patterns or conventions does it follow?",
  "Explain the error handling strategy. How are errors propagated and surfaced to end users?",
  "How would you scale this application to handle 10x the current traffic? What bottlenecks do you foresee?",
  "Describe the data flow from a user action to a database write in this application.",
  "What testing strategy would you implement? What test types are most critical for this codebase?",
  "How does this project handle authentication and authorization? What are the security considerations?",
  "Walk me through debugging a production issue where responses are slow. What tools would you use?",
  "How would you implement caching in this system? Where would it provide the most benefit?",
  "Describe how you'd add a major new feature while maintaining backward compatibility.",
];

const FOLLOW_UPS = [
  "Can you elaborate on the trade-offs of that approach?",
  "How would this change under high load or in a distributed environment?",
  "What would you do differently if starting from scratch?",
  "How does that handle failure modes like network timeouts?",
  "Give me a concrete example from the codebase.",
];

function evalAnswer(answer) {
  const quality = Math.min(1, answer.trim().length / 280);
  const base = 4.5 + quality * 3.8 + (Math.random() - 0.5) * 0.8;
  const clamp = v => +Math.min(10, Math.max(1, v)).toFixed(1);
  return {
    clarity: clamp(base + (Math.random() - 0.5) * 1.5),
    technical_depth: clamp(base - 0.5 + (Math.random() - 0.5) * 2),
    correctness: clamp(base + 0.4 + (Math.random() - 0.5) * 1.5),
    confidence: clamp(base + (Math.random() - 0.5) * 2),
    weak_areas: quality < 0.4 ? ["depth", "examples"] : quality < 0.7 ? ["specificity"] : [],
  };
}

function makeReport(interview) {
  const evals = interview.turns.filter(t => t.evaluation);
  const avg = key => evals.length ? evals.reduce((s, t) => s + t.evaluation[key], 0) / evals.length : 6.5;
  const clarity = avg("clarity"), depth = avg("technical_depth"),
        correctness = avg("correctness"), confidence = avg("confidence");
  const total = (clarity + depth + correctness + confidence) / 4;
  return {
    total_score: +total.toFixed(2),
    breakdown: { clarity: +clarity.toFixed(1), technical_depth: +depth.toFixed(1), correctness: +correctness.toFixed(1), confidence: +confidence.toFixed(1) },
    strengths: [
      total > 7 ? "Demonstrated strong command of core concepts with clear, structured explanations." : "Showed solid understanding of the project's foundational architecture.",
      clarity > 7 ? "Communicated ideas with exceptional clarity and logical flow." : "Maintained coherent, organized responses throughout.",
      "Addressed questions directly and stayed on topic.",
    ],
    weaknesses: [
      depth < 6 ? "Technical depth could be improved with more concrete implementation details." : "Some production-readiness considerations were not fully explored.",
      confidence < 6 ? "Hesitation noticeable in system design and scalability answers." : "Trade-off discussions could be more thorough.",
    ],
    suggestions: [
      "Practice whiteboarding system design — focus on data flow, failure modes, and bottlenecks.",
      "Study the codebase's error handling and be ready to critique and improve it.",
      depth < 6 ? "Prepare concrete examples for each technical area before interviews." : "Proactively discuss edge cases and production constraints.",
      "Review distributed systems fundamentals: CAP theorem, idempotency, backpressure.",
    ],
    repo_url: interview.repoUrl,
    repo_summary: interview.summary,
  };
}

const api = {
  async analyzeRepo(url) {
    await delay(1300 + Math.random() * 600);
    const key = Object.keys(REPO_DB).find(k => url.includes(k));
    const name = url.split("/").pop() || "Repository";
    const summary = key ? REPO_DB[key] : {
      project_name: name.charAt(0).toUpperCase() + name.slice(1).replace(/-/g, " "),
      description: `A well-structured ${name} application with clean architecture and modern tooling. Covers multiple integration points with external services.`,
      complexity: ["low","medium","high"][Math.floor(Math.random()*3)],
      tech_stack: ["TypeScript","React","Node.js","PostgreSQL","Redis","Docker"].slice(0, 3+Math.floor(Math.random()*3)),
      key_modules: ["Authentication","API Layer","Database Models","UI Components","Config & Infra"],
    };
    return { repoId: `r_${Date.now()}`, summary, cached: !!key };
  },

  async startInterview({ repoId, duration, pressureLevel, repoUrl, summary }) {
    await delay(700);
    const id = `iv_${ivCounter++}`;
    const pool = [...QUESTIONS].sort(() => Math.random() - 0.5);
    const total = Math.min(pool.length, Math.ceil(duration * 0.75));
    const interview = { id, repoId, repoUrl: repoUrl||"", summary: summary||{}, duration, pressureLevel, turns: [], pool, total, status: "in_progress", createdAt: new Date().toISOString() };
    sessionStorage.setItem(`ivs:${id}`, JSON.stringify(interview));
    return { interviewId: id, question: pool[0], durationMinutes: duration };
  },

  async submitAnswer({ interviewId, answer }) {
    await delay(850 + Math.random() * 400);
    const raw = sessionStorage.getItem(`ivs:${interviewId}`);
    if (!raw) throw new Error("Interview session not found");
    const iv = JSON.parse(raw);
    const eval_ = evalAnswer(answer);
    const idx = iv.turns.length - 1;
    if (idx >= 0 && iv.turns[idx] && !iv.turns[idx].answer) {
      iv.turns[idx].answer = answer;
      iv.turns[idx].evaluation = eval_;
    } else {
      iv.turns.push({ question: iv.pool[iv.turns.length] || QUESTIONS[0], answer, evaluation: eval_ });
    }
    const answered = iv.turns.filter(t => t.answer).length;
    const done = answered >= iv.total;
    let nextQuestion = null;
    if (!done) {
      const avgScore = (eval_.clarity + eval_.technical_depth + eval_.correctness) / 3;
      nextQuestion = (iv.pressureLevel === "high" && avgScore < 6)
        ? FOLLOW_UPS[Math.floor(Math.random() * FOLLOW_UPS.length)]
        : (iv.pool[answered] || QUESTIONS[answered % QUESTIONS.length]);
      iv.turns.push({ question: nextQuestion });
    }
    sessionStorage.setItem(`ivs:${interviewId}`, JSON.stringify(iv));
    return { answered, totalQuestions: iv.total, evaluation: eval_, nextQuestion, done };
  },

  async finishInterview(interviewId) {
    await delay(1100);
    const raw = sessionStorage.getItem(`ivs:${interviewId}`);
    if (!raw) throw new Error("Not found");
    const iv = JSON.parse(raw);
    iv.status = "completed";
    const repId = `rep_${repCounter++}`;
    const report = makeReport(iv);
    const repData = { reportId: repId, report, turns: iv.turns.filter(t => t.answer).map((t,i) => ({...t, idx:i})) };
    sessionStorage.setItem(`rep:${repId}`, JSON.stringify(repData));
    const list = JSON.parse(localStorage.getItem("ix:list") || "[]");
    list.unshift({ id: interviewId, project_name: iv.summary?.project_name||"Interview", repo_url: iv.repoUrl, status:"completed", created_at: iv.createdAt, duration: iv.duration, pressure_level: iv.pressureLevel, report_id: repId, total_score: report.total_score });
    localStorage.setItem("ix:list", JSON.stringify(list.slice(0,20)));
    sessionStorage.removeItem(`ivs:${interviewId}`);
    return { reportId: repId };
  },

  async listInterviews() {
    await delay(350);
    return { interviews: JSON.parse(localStorage.getItem("ix:list") || "[]") };
  },

  async getReport(id) {
    await delay(450);
    const raw = sessionStorage.getItem(`rep:${id}`);
    if (raw) return JSON.parse(raw);
    // Demo fallback
    return {
      reportId: id,
      report: {
        total_score: 7.4,
        breakdown: { clarity: 7.8, technical_depth: 6.9, correctness: 7.6, confidence: 7.3 },
        strengths: ["Strong command of core Express.js patterns and middleware composition.", "Clear articulation of request/response lifecycle.", "Proactively discussed trade-offs without prompting."],
        weaknesses: ["System design answers lacked discussion of failure modes.", "Testing strategy could be more comprehensive."],
        suggestions: ["Deep-dive into distributed tracing for production debugging.", "Study chaos engineering principles for resilience discussions.", "Practice load testing with concrete metrics.", "Review DB connection pooling and query optimization."],
        repo_url: "https://github.com/expressjs/express",
        repo_summary: { project_name: "Express.js", description: "Fast Node.js web framework", complexity: "high" },
      },
      turns: [
        { idx:0, question:"Walk me through the overall architecture.", answer:"Express follows a middleware-based architecture. The app object maintains a router stack, and each request traverses the middleware pipeline in order...", evaluation:{clarity:8.1,technical_depth:7.2,correctness:8.0,confidence:7.5,weak_areas:[]} },
        { idx:1, question:"How does the routing system work?", answer:"The routing system uses a Layer abstraction. Each route is a Layer with a regexp and handler. The Router matches URLs by iterating layers and calling matching handlers...", evaluation:{clarity:7.5,technical_depth:7.8,correctness:7.9,confidence:6.8,weak_areas:["depth"]} },
        { idx:2, question:"How would you scale this to 10x traffic?", answer:"Start with horizontal scaling behind a load balancer, add connection pooling, Redis for sessions and caching, CDN for static assets, and database read replicas...", evaluation:{clarity:7.2,technical_depth:6.5,correctness:7.0,confidence:7.8,weak_areas:["specificity"]} },
      ],
    };
  },

  async joinWaitlist(email) {
    await delay(600);
    const list = JSON.parse(localStorage.getItem("ix:waitlist") || "[]");
    list.push({ email, at: new Date().toISOString() });
    localStorage.setItem("ix:waitlist", JSON.stringify(list));
    return { ok: true };
  },
};

// ─── Toast System ─────────────────────────────────────────────────────────────
let toastId = 0;
const toastListeners = new Set();
const toasts = [];
function toast({ title, description, variant = "default", duration = 4000 }) {
  const id = ++toastId;
  toasts.push({ id, title, description, variant });
  toastListeners.forEach(fn => fn([...toasts]));
  setTimeout(() => {
    const idx = toasts.findIndex(t => t.id === id);
    if (idx > -1) { toasts.splice(idx, 1); toastListeners.forEach(fn => fn([...toasts])); }
  }, duration);
}
function useToast() {
  const [list, setList] = useState([...toasts]);
  useEffect(() => { toastListeners.add(setList); return () => toastListeners.delete(setList); }, []);
  return { toasts: list, dismiss: id => { const i = toasts.findIndex(t => t.id === id); if(i>-1){toasts.splice(i,1); toastListeners.forEach(fn=>fn([...toasts]));} } };
}

// ─── Router ───────────────────────────────────────────────────────────────────
function useRouter() {
  const [path, setPath] = useState(location.hash.slice(1) || "/");
  useEffect(() => {
    const handler = () => setPath(location.hash.slice(1) || "/");
    window.addEventListener("hashchange", handler);
    return () => window.removeEventListener("hashchange", handler);
  }, []);
  const navigate = useCallback(p => { location.hash = p; }, []);
  return { path, navigate };
}
function Link({ href, children, className, onClick, style }) {
  return <a href={`#${href}`} className={className} style={style} onClick={e => { if(onClick){onClick(e);} }}>{children}</a>;
}

function fmtTime(s) { return `${String(Math.floor(s/60)).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`; }
function scoreColor(v) { return v >= 7 ? "var(--emerald)" : v >= 5 ? "var(--amber)" : "var(--rose)"; }
function scoreClass(v) { return v >= 7 ? "pill-green text-emerald" : v >= 5 ? "pill-amber text-amber" : "pill-red text-rose"; }

// ─── Toaster ─────────────────────────────────────────────────────────────────
function Toaster() {
  const { toasts: list, dismiss } = useToast();
  return (
    <div className="toast-container">
      {list.map(t => (
        <div key={t.id} className={`toast${t.variant==="destructive"?" toast-error":""}`} onClick={() => dismiss(t.id)}>
          {t.title && <div className="toast-title">{t.title}</div>}
          {t.description && <div className="toast-desc">{t.description}</div>}
          <div className="toast-bar" />
        </div>
      ))}
    </div>
  );
}

// ─── DASHBOARD ────────────────────────────────────────────────────────────────
const DURATIONS = [5,10,15,30];
const PRESSURE = [
  {value:"low",emoji:"🌱",label:"Soft",desc:"Friendly, encouraging"},
  {value:"medium",emoji:"⚡",label:"Medium",desc:"Realistic, neutral"},
  {value:"high",emoji:"🔥",label:"Brutal",desc:"Tough follow-ups"},
];
const EXAMPLES = ["https://github.com/expressjs/express","https://github.com/facebook/react","https://github.com/vercel/next.js"];

function Dashboard({ navigate }) {
  const [url, setUrl] = useState("");
  const [analyzing, setAnalyzing] = useState(false);
  const [starting, setStarting] = useState(false);
  const [repoId, setRepoId] = useState(null);
  const [summary, setSummary] = useState(null);
  const [duration, setDuration] = useState(15);
  const [pressure, setPressure] = useState("medium");
  const [progress, setProgress] = useState(0);

  const onAnalyze = async () => {
    if (!url.trim()) return;
    setAnalyzing(true); setSummary(null); setRepoId(null); setProgress(0);
    const iv = setInterval(() => setProgress(p => Math.min(90, p + 10)), 150);
    try {
      const r = await api.analyzeRepo(url.trim());
      clearInterval(iv); setProgress(100);
      setTimeout(() => { setRepoId(r.repoId); setSummary(r.summary); setAnalyzing(false); }, 200);
      toast({ title: r.cached ? "Loaded from cache" : "Repo analyzed!", description: r.summary.project_name });
    } catch(e) {
      clearInterval(iv); setAnalyzing(false); setProgress(0);
      toast({ title:"Analysis failed", description: e.message, variant:"destructive" });
    }
  };

  const onStart = async () => {
    if (!repoId) return;
    setStarting(true);
    try {
      const r = await api.startInterview({ repoId, duration, pressureLevel: pressure, repoUrl: url.trim(), summary });
      sessionStorage.setItem(`iv:${r.interviewId}`, JSON.stringify({ firstQuestion: r.question, durationMinutes: r.durationMinutes }));
      navigate(`/interview/${r.interviewId}`);
    } catch(e) {
      toast({ title:"Could not start", description: e.message, variant:"destructive" });
      setStarting(false);
    }
  };

  const complexityBadge = { low:"badge-emerald", medium:"badge-amber", high:"badge-rose" };

  return (
    <div className="page">
      <div style={{marginBottom:36}}>
        <div className="label-xs" style={{color:"rgba(0,224,122,0.7)",marginBottom:8}}>New session</div>
        <h1 className="font-display" style={{fontSize:36,fontWeight:800,letterSpacing:"-0.02em",marginBottom:6}}>Set up an interview</h1>
        <p style={{color:"var(--fg2)"}}>Drop a GitHub URL. We'll analyze the project and tailor every question to it.</p>
      </div>

      {/* Step 1 */}
      <div className="card" style={{padding:24,marginBottom:16}}>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16}}>
          <div className="step-num font-mono">1</div>
          <span style={{fontWeight:600,fontSize:14}}>GitHub repository</span>
        </div>
        <div style={{display:"flex",gap:10}}>
          <div style={{position:"relative",flex:1}}>
            <span style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",color:"var(--fg3)"}}><I.Github size={16}/></span>
            <input
              value={url} onChange={e => setUrl(e.target.value)}
              onKeyDown={e => e.key==="Enter" && onAnalyze()}
              placeholder="https://github.com/owner/repo"
              style={{paddingLeft:38}}
            />
          </div>
          <button className="btn btn-primary" onClick={onAnalyze} disabled={analyzing || !url.trim()} style={{whiteSpace:"nowrap"}}>
            {analyzing ? <><I.Loader size={14}/> Analyzing…</> : <><I.Sparkles size={14}/> Analyze</>}
          </button>
        </div>
        {analyzing && (
          <div style={{marginTop:14}}>
            <div className="progress-bar"><div className="progress-fill" style={{width:`${progress}%`}}/></div>
            <div style={{fontSize:12,color:"var(--fg3)",marginTop:6}}>Fetching repo metadata…</div>
          </div>
        )}
        {!summary && !analyzing && (
          <div style={{marginTop:12,display:"flex",flexWrap:"wrap",gap:8,alignItems:"center"}}>
            <span style={{fontSize:12,color:"var(--fg3)"}}>Try:</span>
            {EXAMPLES.map(e => (
              <button key={e} className="btn btn-ghost" style={{fontSize:12,padding:"3px 8px",fontFamily:"'JetBrains Mono',monospace",color:"var(--primary)"}} onClick={() => setUrl(e)}>
                {e.replace("https://github.com/","")}
              </button>
            ))}
          </div>
        )}
      </div>

      {/* Step 2: Summary */}
      {summary && (
        <div className="card fade-up" style={{padding:24,marginBottom:16}}>
          <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:16,marginBottom:24}}>
            <div>
              <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
                <div className="step-num font-mono">2</div>
                <span className="label-xs">Project summary</span>
              </div>
              <div className="font-display" style={{fontSize:24,fontWeight:700,marginBottom:6}}>{summary.project_name}</div>
              <div style={{fontSize:14,color:"var(--fg2)",lineHeight:1.65,maxWidth:600}}>{summary.description}</div>
            </div>
            <span className={`badge ${complexityBadge[summary.complexity]||"badge-secondary"}`} style={{flexShrink:0,textTransform:"capitalize"}}>
              {summary.complexity} complexity

          </div>

          <div className="grid-2" style={{marginBottom:28}}>
            <div>
              <div className="label-xs" style={{marginBottom:10,display:"flex",alignItems:"center",gap:5}}>
                <I.Zap/> Tech stack
              </div>
              <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                {summary.tech_stack.map(t => (
                  <span key={t} style={{display:"inline-flex",alignItems:"center",gap:5,padding:"4px 10px",borderRadius:6,border:"1px solid var(--border2)",background:"var(--card2)",fontSize:12,fontWeight:500}}>
                    <I.Code2/>{t}
                  </span>
                ))}
              </div>
            </div>
            <div>
              <div className="label-xs" style={{marginBottom:10,display:"flex",alignItems:"center",gap:5}}>
                <I.Layers/> Key modules
              </div>
              <ul style={{listStyle:"none",display:"flex",flexDirection:"column",gap:6}}>
                {summary.key_modules.map(m => (
                  <li key={m} style={{fontSize:14,color:"var(--fg2)",display:"flex",alignItems:"center",gap:8}}>
                    <span style={{color:"var(--primary)"}}>›</span>{m}
                  </li>
                ))}
              </ul>
            </div>
          </div>

          {/* Step 3 */}
          <div style={{borderTop:"1px solid var(--border)",paddingTop:24}}>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:20}}>
              <div className="step-num font-mono">3</div>
              <span style={{fontWeight:600,fontSize:14}}>Configure session</span>
            </div>
            <div className="grid-2" style={{marginBottom:24}}>
              <div>
                <div className="label-xs" style={{marginBottom:10,display:"flex",alignItems:"center",gap:5}}><I.Clock/> Duration</div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8}}>
                  {DURATIONS.map(d => (
                    <button key={d} className={`dur-btn${duration===d?" selected":""}`} onClick={() => setDuration(d)}>{d}m</button>
                  ))}
                </div>
              </div>
              <div>
                <div className="label-xs" style={{marginBottom:10}}>Pressure level</div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8}}>
                  {PRESSURE.map(p => (
                    <button key={p.value} className={`pressure-btn${pressure===p.value?" selected":""}`} onClick={() => setPressure(p.value)}>
                      <div style={{fontSize:18,marginBottom:3}}>{p.emoji}</div>
                      <div style={{fontWeight:600,fontSize:12,marginBottom:2}}>{p.label}</div>
                      <div style={{fontSize:11,color:"var(--fg3)",lineHeight:1.3}}>{p.desc}</div>
                    </button>
                  ))}
                </div>
              </div>
            </div>
            <button className="btn btn-primary btn-lg" style={{width:"100%"}} onClick={onStart} disabled={starting}>
              {starting ? <><I.Loader/> Starting interview…</> : <><I.Play/> Start interview <I.ChevronRight/></>}
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── INTERVIEW ────────────────────────────────────────────────────────────────
function Interview({ navigate, pathId }) {
  const interviewId = pathId;
  const [turns, setTurns] = useState([]);
  const [draft, setDraft] = useState("");
  const [submitting, setSubmitting] = useState(false);
  const [listening, setListening] = useState(false);
  const [interim, setInterim] = useState("");
  const [processing, setProcessing] = useState(false);
  const [progress, setProgress] = useState({ answered:0, total:0 });
  const [secondsLeft, setSecondsLeft] = useState(null);
  const [voiceUnsupported, setVoiceUnsupported] = useState(false);
  const [done, setDone] = useState(false);
  const recRef = useRef(null);
  const scrollRef = useRef(null);
  const finalRef = useRef("");

  useEffect(() => {
    const raw = sessionStorage.getItem(`iv:${interviewId}`);
    if (!raw) { toast({ title:"Session not found", description:"Returning to dashboard", variant:"destructive" }); navigate("/dashboard"); return; }
    const d = JSON.parse(raw);
    setTurns([{ question: d.firstQuestion }]);
    setSecondsLeft(d.durationMinutes * 60);
  }, []);

  useEffect(() => {
    if (secondsLeft===null||done||secondsLeft<=0) return;
    const t = setInterval(() => setSecondsLeft(s => Math.max(0,s-1)), 1000);
    return () => clearInterval(t);
  }, [secondsLeft, done]);

  useEffect(() => {
    if (secondsLeft===0 && !done && turns.length>0) finishEarly();
  }, [secondsLeft]);

  useEffect(() => {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) { setVoiceUnsupported(true); return; }
    const rec = new SR(); rec.continuous=true; rec.interimResults=true; rec.lang="en-US";
    rec.onresult = e => {
      let fin="", interim_="";
      for(let i=e.resultIndex;i<e.results.length;i++){
        if(e.results[i].isFinal) fin+=e.results[i][0].transcript;
        else interim_+=e.results[i][0].transcript;
      }
      if(fin){ finalRef.current+=fin+" "; setDraft(d=>d?`${d} ${fin}`.trim():fin.trim()); }
      setInterim(interim_);
    };
    rec.onend = () => { setListening(false); setInterim(""); };
    rec.onerror = () => { setListening(false); setInterim(""); };
    recRef.current = rec;
    return () => { try{ rec.stop(); }catch{} };
  }, []);

  useEffect(() => {
    scrollRef.current?.scrollTo({ top: scrollRef.current.scrollHeight, behavior:"smooth" });
  }, [turns, interim, processing]);

  const toggleMic = () => {
    if(!recRef.current) return;
    if(listening){ try{recRef.current.stop();}catch{} }
    else{ try{ finalRef.current=""; recRef.current.start(); setListening(true); }catch{} }
  };

  const submitAnswer = async () => {
    if(!draft.trim()||submitting) return;
    if(listening){ try{recRef.current?.stop();}catch{} }
    const answer = draft.trim();
    setSubmitting(true); setProcessing(true);
    setTurns(prev => { const c=[...prev]; if(c[c.length-1]) c[c.length-1].answer=answer; return c; });
    setDraft("");
    try {
      const r = await api.submitAnswer({ interviewId, answer });
      setProgress({ answered:r.answered, total:r.totalQuestions });
      setTurns(prev => {
        const c=[...prev];
        if(c[c.length-1]) c[c.length-1].evaluation=r.evaluation;
        if(!r.done && r.nextQuestion) c.push({ question:r.nextQuestion });
        return c;
      });
      if(r.done){
        setDone(true);
        toast({ title:"Interview complete!", description:"Generating your report…" });
        const fr = await api.finishInterview(interviewId);
        navigate(`/report/${fr.reportId}`);
      }
    } catch(e) {
      toast({ title:"Submit failed", description:e.message, variant:"destructive" });
    } finally { setSubmitting(false); setProcessing(false); }
  };

  const finishEarly = async () => {
    setDone(true); setSubmitting(true);
    try {
      const fr = await api.finishInterview(interviewId);
      navigate(`/report/${fr.reportId}`);
    } catch(e) {
      toast({ title:"Could not finish", description:e.message, variant:"destructive" });
      setDone(false); setSubmitting(false);
    }
  };

  const timerCritical = secondsLeft!==null && secondsLeft < 60;
  const pct = progress.total>0 ? (progress.answered/progress.total)*100 : 0;

  return (
    <div style={{maxWidth:860,margin:"0 auto",padding:"20px 16px",height:"calc(100vh - 64px)",display:"flex",flexDirection:"column"}}>
      {/* Header */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12,flexShrink:0}}>
        <div>
          <div className="label-xs" style={{marginBottom:4}}>Interview in progress</div>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontSize:14,fontWeight:600}}>
              Question {turns.length}{progress.total>0&&<span style={{color:"var(--fg3)"}}> of ~{progress.total}</span>}
            </span>
            {progress.total>0&&(
              <div className="progress-bar" style={{width:80}}>
                <div className="progress-fill" style={{width:`${pct}%`}}/>
              </div>
            )}
          </div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          {secondsLeft!==null&&(
            <div className={`timer font-mono${timerCritical?" critical":""}`}>
              <I.Clock/> {fmtTime(secondsLeft)}
            </div>
          )}
          <button className="btn btn-outline btn-sm" onClick={finishEarly} disabled={submitting}>End early</button>
        </div>
      </div>

      {/* Chat */}
      <div ref={scrollRef} className="chat-scroll" style={{marginBottom:12}}>
        {turns.map((t,i) => (
          <div key={i} className="fade-up">
            <div className="turn-ai" style={{marginBottom:t.answer?12:0}}>
              <div className="avatar avatar-ai"><I.Bot/></div>
              <div style={{flex:1}}>
                <div className="label-xs" style={{color:"var(--primary)",marginBottom:8}}>Interviewer</div>
                <div style={{fontSize:15,lineHeight:1.7}}>{t.question}</div>
              </div>
            </div>
            {t.answer&&(
              <div className="turn-you">
                <div className="bubble">
                  <div className="label-xs" style={{marginBottom:8,display:"flex",alignItems:"center",gap:5}}><I.User/>You</div>
                  <div style={{fontSize:14,lineHeight:1.7,color:"rgba(232,236,244,0.9)",whiteSpace:"pre-wrap"}}>{t.answer}</div>
                  {t.evaluation&&(
                    <div style={{marginTop:12,paddingTop:12,borderTop:"1px solid var(--border)"}}>
                      <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                        {[["clarity","Clarity"],["technical_depth","Depth"],["correctness","Correct"],["confidence","Conf."]].map(([key,label]) => {
                          const v=t.evaluation[key];
                          return (
                            <div key={key} className={`score-pill ${scoreClass(v)}`}>
                              <span style={{color:"var(--fg3)"}}>{label}</span>
                              <span style={{fontWeight:700}}>{v.toFixed(1)}</span>
                            </div>
                          );
                        })}
                      </div>
                      {t.evaluation.weak_areas?.length>0&&(
                        <div style={{marginTop:8,fontSize:12,color:"var(--fg3)"}}>
                          Focus on: {t.evaluation.weak_areas.join(", ")}
                        </div>
                      )}
                    </div>
                  )}
                </div>
              </div>
            )}
          </div>
        ))}
        {processing&&(
          <div style={{display:"flex",alignItems:"center",gap:8,paddingLeft:44,color:"var(--fg3)",fontSize:14}}>
            <I.Loader size={14}/> Evaluating your answer…
          </div>
        )}
        {listening&&interim&&(
          <div className="turn-you">
            <div className="bubble bubble-live">
              <div className="label-xs" style={{color:"var(--primary)",marginBottom:8,display:"flex",alignItems:"center",gap:6}}>
                <span style={{position:"relative",display:"inline-flex",width:8,height:8}}>
                  <span style={{position:"absolute",inset:0,borderRadius:"50%",background:"var(--primary)",animation:"ping 1.5s ease-out infinite",opacity:0.6}}/>
                  <span style={{width:8,height:8,borderRadius:"50%",background:"var(--primary)"}}/>
                </span>
                Live transcript
              </div>
              <div style={{fontSize:14,color:"rgba(232,236,244,0.6)",fontStyle:"italic"}}>{interim}</div>
            </div>
          </div>
        )}
      </div>

      {/* Input */}
      <div className="card" style={{padding:16,flexShrink:0}}>
        {voiceUnsupported&&(
          <div style={{display:"flex",alignItems:"center",gap:6,color:"var(--amber)",fontSize:12,marginBottom:10}}>
            <I.AlertCircle/> Voice not supported — type your answer below.
          </div>
        )}
        <div style={{display:"flex",gap:10,alignItems:"flex-end"}}>
          <textarea
            value={draft} onChange={e=>setDraft(e.target.value)}
            placeholder={listening?"Listening… speak naturally.":"Type or speak your answer…"}
            disabled={submitting||done} rows={3}
            style={{flex:1,minHeight:72}}
            onKeyDown={e=>{ if(e.key==="Enter"&&(e.metaKey||e.ctrlKey)){e.preventDefault();submitAnswer();} }}
          />
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            <button
              className={`btn btn-icon${listening?" btn-danger":" btn-outline"}`}
              onClick={toggleMic} disabled={voiceUnsupported||submitting||done}
              title={listening?"Stop":"Speak"}
            >
              {listening?<I.MicOff/>:<I.Mic/>}
            </button>
            <button
              className="btn btn-primary btn-icon" onClick={submitAnswer}
              disabled={!draft.trim()||submitting||done} title="Submit (Cmd+Enter)"
            >
              {submitting?<I.Loader/>:<I.Send/>}
            </button>
          </div>
        </div>
        <div style={{display:"flex",justifyContent:"space-between",marginTop:8,fontSize:12,color:"var(--fg3)"}}>
          <span>Cmd/Ctrl + Enter to submit</span>
          {progress.total>0&&<span>{progress.answered}/{progress.total} answered</span>}
        </div>
      </div>
    </div>
  );
}

// ─── REPORT ───────────────────────────────────────────────────────────────────
const { PieChart, Pie, Cell, BarChart, Bar, XAxis, YAxis, Tooltip, CartesianGrid, RadarChart, Radar, PolarGrid, PolarAngleAxis, ResponsiveContainer } = Recharts;
const COLORS = ["#00e07a","#38bdf8","#fbbf24","#a78bfa"];

function Report({ navigate, pathId }) {
  const [data, setData] = useState(null);
  const [error, setError] = useState(null);
  const [expanded, setExpanded] = useState({});

  useEffect(() => {
    api.getReport(pathId).then(setData).catch(e=>setError(e.message||"Failed"));
  }, [pathId]);

  if(error) return <div className="page" style={{textAlign:"center"}}><div style={{color:"var(--rose)",marginBottom:20}}>{error}</div><button className="btn btn-primary" onClick={()=>navigate("/dashboard")}>Back to Dashboard</button></div>;

  const { report, turns } = data;
  const total = +report.total_score;
  const breakdown = Object.entries(report.breakdown).map(([k,v],i)=>({ name:{clarity:"Clarity",technical_depth:"Depth",correctness:"Correct",confidence:"Conf."}[k]||k, value:+v, color:COLORS[i%COLORS.length] }));
  const radarData = breakdown.map(b=>({ subject:b.name, A:b.value, fullMark:10 }));
  const barData = turns.filter(t=>t.evaluation).map((t,i)=>({ name:`Q${i+1}`, Clarity:+(t.evaluation.clarity||0).toFixed(1), Depth:+(t.evaluation.technical_depth||0).toFixed(1), Correct:+(t.evaluation.correctness||0).toFixed(1), Conf:+(t.evaluation.confidence||0).toFixed(1) }));
  const tStyle = { background:"var(--card)", border:"1px solid var(--border2)", borderRadius:8, color:"var(--fg)", fontSize:12 };

  return (
    <div className="page">
      <button className="btn btn-ghost btn-sm" style={{marginBottom:20,display:"flex",alignItems:"center",gap:6,padding:"6px 0"}} onClick={()=>navigate("/record")}>
        ← All interviews
      </button>

      {/* Header */}
      <div className="grid-2" style={{marginBottom:16}}>
        <div className="card col-span-2" style={{padding:32,gridColumn:"1/3"}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 200px",gap:24,alignItems:"start"}}>
            <div>
              <div className="label-xs" style={{color:"var(--primary)",marginBottom:8}}>Final report</div>
              <div className="font-display" style={{fontSize:30,fontWeight:800,marginBottom:6}}>{report.repo_summary?.project_name||"Interview Report"}</div>
              {report.repo_url&&<a href={report.repo_url} target="_blank" rel="noreferrer" style={{fontSize:12,color:"var(--fg3)",display:"inline-flex",alignItems:"center",gap:4,textDecoration:"none"}}><I.Github/>{report.repo_url.replace("https://github.com/","")}</a>}
              <div style={{marginTop:24,display:"flex",alignItems:"flex-end",gap:24,flexWrap:"wrap"}}>
                <ScoreRing score={total}/>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,flex:1,minWidth:200}}>
                  {breakdown.map(b=>(
                    <div key={b.name} className="breakdown-box">
                      <div style={{fontSize:10,textTransform:"uppercase",letterSpacing:"0.08em",color:b.color,marginBottom:4}}>{b.name}</div>
                      <div style={{display:"flex",alignItems:"center",gap:8}}>
                        <span style={{fontWeight:700,fontSize:16,fontFamily:"'JetBrains Mono',monospace"}}>{b.value.toFixed(1)}</span>
                        <div className="progress-bar" style={{flex:1,height:3}}><div className="progress-fill" style={{width:`${(b.value/10)*100}%`,background:b.color}}/></div>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            </div>
            <div>
              <div className="label-xs" style={{marginBottom:10}}>Radar</div>
              <ResponsiveContainer width="100%" height={180}>
                <RadarChart data={radarData}>
                  <PolarGrid stroke="var(--border)"/>
                  <PolarAngleAxis dataKey="subject" tick={{fontSize:11,fill:"var(--fg3)"}}/>
                  <Radar dataKey="A" stroke="var(--primary)" fill="var(--primary)" fillOpacity={0.15} strokeWidth={2}/>
                </RadarChart>
              </ResponsiveContainer>
            </div>
          </div>
        </div>
      </div>

      {/* S/W/S */}
      <div className="grid-3" style={{marginBottom:16}}>
        {[
          {icon:I.TrendingUp,title:"Strengths",items:report.strengths,color:"var(--emerald)",bg:"rgba(52,211,153,0.1)"},
          {icon:I.AlertTriangle,title:"Weaknesses",items:report.weaknesses,color:"var(--amber)",bg:"rgba(251,191,36,0.1)"},
          {icon:I.Lightbulb,title:"Suggestions",items:report.suggestions,color:"var(--primary)",bg:"var(--primary-dim)"},
        ].map(s=>(
          <div key={s.title} className="section-card">
            <div className="section-icon" style={{background:s.bg,color:s.color}}><s.icon/></div>
            <div style={{fontWeight:600,fontSize:14,marginBottom:14}}>{s.title}</div>
            <ul style={{listStyle:"none",display:"flex",flexDirection:"column",gap:10}}>
              {s.items.map((item,i)=>(
                <li key={i} style={{fontSize:13,color:"var(--fg2)",lineHeight:1.6,display:"flex",gap:8}}>
                  <span style={{color:s.color,flexShrink:0}}>›</span>{item}
                </li>
              ))}
            </ul>
          </div>
        ))}
      </div>

      {/* Bar chart */}
      {barData.length>0&&(
        <div className="card" style={{padding:24,marginBottom:16}}>
          <div style={{fontWeight:600,marginBottom:20}}>Per-question scores</div>
          <ResponsiveContainer width="100%" height={220}>
            <BarChart data={barData} barGap={2} barCategoryGap="20%">
              <CartesianGrid strokeDasharray="3 3" stroke="var(--border)" vertical={false}/>
              <XAxis dataKey="name" stroke="var(--fg3)" fontSize={12} tickLine={false}/>
              <YAxis domain={[0,10]} stroke="var(--fg3)" fontSize={12} tickLine={false}/>
              <Tooltip contentStyle={tStyle}/>
              {["Clarity","Depth","Correct","Conf"].map((k,i)=>(
                <Bar key={k} dataKey={k} fill={COLORS[i]} radius={[3,3,0,0]}/>
              ))}
            </BarChart>
          </ResponsiveContainer>
          <div style={{display:"flex",gap:16,justifyContent:"center",marginTop:10,flexWrap:"wrap"}}>
            {["Clarity","Depth","Correct","Conf"].map((k,i)=>(
              <div key={k} style={{display:"flex",alignItems:"center",gap:5,fontSize:12,color:"var(--fg3)"}}>
                <div style={{width:10,height:10,borderRadius:2,background:COLORS[i]}}/>
                {k}
              </div>
            ))}
          </div>
        </div>
      )}

      {/* Transcript */}
      <div className="card" style={{padding:24,marginBottom:32}}>
        <div style={{fontWeight:600,marginBottom:20}}>Full transcript</div>
        {turns.map((t,i)=>(
          <div key={i} className="transcript-row">
            <div className="transcript-header" onClick={()=>setExpanded(p=>({...p,[i]:!p[i]}))}>
              <div style={{display:"flex",alignItems:"center",gap:12,minWidth:0,flex:1}}>
                <div className="step-num font-mono" style={{fontSize:11}}>Q{i+1}</div>
                <div style={{fontSize:14,fontWeight:500,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.question}</div>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:8,flexShrink:0}}>
                {t.evaluation&&(
                  <div style={{display:"flex",gap:3}}>
                    {["clarity","technical_depth","correctness","confidence"].map((k,ci)=>(
                      <div key={k} style={{width:5,borderRadius:2,background:COLORS[ci],height:Math.max(4,(t.evaluation[k]/10)*20)}}/>
                    ))}
                  </div>
                )}
                {expanded[i]?<I.ChevronUp/>:<I.ChevronDown/>}
              </div>
            </div>
            {expanded[i]&&(
              <div className="transcript-body">
                {t.answer&&<div style={{fontSize:14,color:"var(--fg2)",lineHeight:1.7,marginBottom:10,whiteSpace:"pre-wrap"}}>{t.answer}</div>}
                {t.evaluation&&(
                  <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                    {[["clarity","Clarity"],["technical_depth","Depth"],["correctness","Correct"],["confidence","Conf."]].map(([k,l])=>(
                      <div key={k} className={`score-pill ${scoreClass(t.evaluation[k])}`}>
                        <span style={{color:"var(--fg3)"}}>{l}</span>
                        <span style={{fontWeight:700}}>{t.evaluation[k].toFixed(1)}</span>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            )}
          </div>
        ))}
      </div>

      <div style={{textAlign:"center",marginBottom:40}}>
        <button className="btn btn-primary btn-lg" onClick={()=>navigate("/dashboard")}>
          <I.RotateCcw/> Run another interview
        </button>
      </div>
    </div>
  );
}

// ─── RECORD ───────────────────────────────────────────────────────────────────
function Record({ navigate }) {
  const [rows, setRows] = useState(null);
  const [error, setError] = useState(null);
  useEffect(()=>{ api.listInterviews().then(r=>setRows(r.interviews)).catch(e=>setError(e.message)); },[]);

  return (
    <div className="page">
      <div style={{display:"flex",alignItems:"flex-end",justifyContent:"space-between",marginBottom:32,flexWrap:"wrap",gap:16}}>
        <div>
          <div className="label-xs" style={{color:"rgba(0,224,122,0.7)",marginBottom:8}}>History</div>
          <div className="font-display" style={{fontSize:36,fontWeight:800}}>Record</div>
          <div style={{color:"var(--fg2)",marginTop:4}}>Past interviews and their reports.</div>
        </div>
        <button className="btn btn-primary" onClick={()=>navigate("/dashboard")}><I.Plus/> New interview</button>
      </div>

      {!rows&&!error&&<div style={{textAlign:"center",padding:60,color:"var(--fg3)"}}><I.Loader/></div>}
      {error&&<div className="card" style={{padding:20,borderColor:"rgba(248,113,113,0.3)",background:"rgba(248,113,113,0.05)",color:"var(--rose)",fontSize:14}}>{error}</div>}

      {rows&&rows.length===0&&(
        <div className="card" style={{padding:60,textAlign:"center"}}>
          <I.FileText/>
          <div style={{fontWeight:600,fontSize:18,marginTop:16,marginBottom:6}}>No interviews yet</div>
          <div style={{color:"var(--fg2)",marginBottom:24,fontSize:14}}>Run your first one to see results here.</div>
          <button className="btn btn-primary" onClick={()=>navigate("/dashboard")}><I.Plus/> Start now</button>
        </div>
      )}

      {rows&&rows.length>0&&(
        <div className="card">
          {rows.map((r,i)=>{
            const score=r.total_score?+r.total_score:null;
            const pressure={low:"🌱 Low",medium:"⚡ Medium",high:"🔥 Brutal"}[r.pressure_level]||r.pressure_level;
            return (
              <div key={r.id} className="record-row" style={{borderBottom:i<rows.length-1?"1px solid var(--border)":"none"}}>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap",marginBottom:4}}>
                    <span style={{fontWeight:600,fontSize:15}}>{r.project_name||"Untitled"}</span>
                    <span className={`badge${r.status==="completed"?" badge-emerald":" badge-amber"}`}>{r.status.replace("_"," ")}</span>
                  </div>
                  <a href={r.repo_url} target="_blank" rel="noreferrer" style={{fontSize:12,color:"var(--fg3)",textDecoration:"none",display:"inline-flex",alignItems:"center",gap:4}}>
                    <I.Github/>{(r.repo_url||"").replace("https://github.com/","")}
                  </a>
                  <div style={{fontSize:12,color:"var(--fg3)",marginTop:4,display:"flex",gap:12,flexWrap:"wrap"}}>
                    <span>{new Date(r.created_at).toLocaleDateString()}</span>
                    <span><I.Clock size={11}/> {r.duration}m</span>
                    <span>{pressure}</span>
                  </div>
                </div>
                <div style={{display:"flex",alignItems:"center",gap:12,flexShrink:0}}>
                  {score!==null&&<div className="font-display" style={{fontSize:20,fontWeight:700,color:scoreColor(score)}}>{score.toFixed(1)}</div>}
                  {r.report_id
                    ? <button className="btn btn-outline btn-sm" onClick={()=>navigate(`/report/${r.report_id}`)}>Report <I.ChevronRight/></button>
                    : <span style={{fontSize:12,color:"var(--fg3)"}}>No report</span>
                  }
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// ─── ABOUT ────────────────────────────────────────────────────────────────────
function About() {
  const steps = [
    {n:"01",t:"We analyze your repo",b:"Pull README, tree, and metadata — summarize project, stack, modules, and complexity. Cached so we don't re-analyze on repeat visits."},
    {n:"02",t:"We run a stateful interview",b:"Questions rotate through overview, implementation, system design, edge cases, and scalability. Coverage and weak areas are tracked across turns."},
    {n:"03",t:"Voice or text — your call",b:"Speak naturally with live transcription, or type. We call the model once you finish, never during streaming."},
    {n:"04",t:"Adaptive follow-ups",b:"Each answer is scored on clarity, depth, correctness, and confidence. The next question depends on the result — challenge, clarify, or probe weakness."},
    {n:"05",t:"Honest report",b:"Final report grades you across all dimensions, surfaces strengths and weaknesses, and gives concrete next steps."},
  ];
  return (
    <div className="page-sm">
      <div className="label-xs" style={{color:"rgba(0,224,122,0.7)",marginBottom:10}}>About</div>
      <h1 className="font-display" style={{fontSize:36,fontWeight:800,marginBottom:16}}>InterviewX</h1>
      <p style={{color:"var(--fg2)",lineHeight:1.75,marginBottom:48,fontSize:15}}>
        InterviewX is an AI interviewer that takes a real GitHub project, learns what it does, and
        runs you through a structured technical interview. It's not a chatbot. It's not a quiz generator.
        It's a simulation of a senior engineer checking whether you actually know your own code.
      </p>
      <div>
        {steps.map((s,i)=>(
          <div key={s.n} style={{display:"flex",gap:20,paddingBottom:i<steps.length-1?32:0}}>
            <div style={{display:"flex",flexDirection:"column",alignItems:"center"}}>
              <div className="step-num font-mono" style={{fontSize:13}}>{s.n}</div>
              {i<steps.length-1&&<div style={{width:1,flex:1,background:"var(--border)",margin:"10px 0"}}/>}
            </div>
            <div style={{paddingTop:4}}>
              <div style={{fontWeight:700,fontSize:16,marginBottom:6}}>{s.t}</div>
              <div style={{fontSize:14,color:"var(--fg2)",lineHeight:1.7}}>{s.b}</div>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ─── CONTACT ─────────────────────────────────────────────────────────────────
function Contact() {
  const [submitting, setSubmitting] = useState(false);
  const onSubmit = e => {
    e.preventDefault(); setSubmitting(true);
    setTimeout(()=>{ toast({title:"Message sent!",description:"We'll get back to you shortly."}); setSubmitting(false); e.target.reset(); },700);
  };
  return (
    <div className="page-sm">
      <div className="label-xs" style={{color:"rgba(0,224,122,0.7)",marginBottom:10}}>Get in touch</div>
      <h1 className="font-display" style={{fontSize:36,fontWeight:800,marginBottom:8}}>Contact</h1>
      <p style={{color:"var(--fg2)",marginBottom:36}}>Bug, feature request, or feedback? Drop us a note.</p>
      <div className="card" style={{padding:32}}>
        <form onSubmit={onSubmit} style={{display:"flex",flexDirection:"column",gap:20}}>
          <div className="grid-2">
            <div><label>Name</label><input required placeholder="Your name"/></div>
            <div><label>Email</label><input type="email" required placeholder="you@company.com"/></div>
          </div>
          <div><label>Message</label><textarea required rows={5} placeholder="Tell us what you think…"/></div>
          <button className="btn btn-primary" type="submit" disabled={submitting} style={{alignSelf:"flex-start"}}>
            {submitting?<><I.Loader/> Sending…</>:<><I.Send/> Send message</>}
          </button>
        </form>
      </div>
    </div>
  );
}

// ─── LOGIN / WAITLIST ─────────────────────────────────────────────────────────
function Login() {
  const [email, setEmail] = useState("");
  const [submitting, setSubmitting] = useState(false);
  const [joined, setJoined] = useState(false);
  const onSubmit = async e => {
    e.preventDefault(); setSubmitting(true);
    try { await api.joinWaitlist(email); setJoined(true); toast({title:"You're on the list!",description:"We'll be in touch soon."}); }
    catch(err) { toast({title:"Could not join",description:err.message,variant:"destructive"}); }
    finally { setSubmitting(false); }
  };
  return (
    <div className="page-xs">
      <div className="card" style={{padding:36}}>
        <div style={{width:52,height:52,borderRadius:14,background:"var(--primary-dim)",display:"grid",placeItems:"center",marginBottom:20,boxShadow:"0 0 20px var(--primary-glow)"}}>
          <I.Sparkles size={24} style={{color:"var(--primary)"}}/>
        </div>
        <div className="font-display" style={{fontSize:24,fontWeight:700,marginBottom:6}}>Join the waitlist</div>
        <div style={{fontSize:14,color:"var(--fg2)",marginBottom:24}}>Accounts are coming soon. Drop your email — we'll let you in early.</div>
        {joined?(
          <div style={{padding:16,borderRadius:12,border:"1px solid rgba(52,211,153,0.3)",background:"rgba(52,211,153,0.07)",display:"flex",gap:12,alignItems:"flex-start"}}>
            <I.CheckCircle size={18} style={{color:"var(--emerald)",flexShrink:0,marginTop:2}}/>
            <div>
              <div style={{fontWeight:600,fontSize:14,color:"var(--emerald)"}}>You're in.</div>
              <div style={{fontSize:12,color:"var(--fg2)",marginTop:3}}>We added <strong style={{color:"var(--fg)"}}>{email}</strong> to the list.</div>
            </div>
          </div>
        ):(
          <form onSubmit={onSubmit} style={{display:"flex",flexDirection:"column",gap:16}}>
            <div><label>Email address</label><input type="email" required placeholder="you@company.com" value={email} onChange={e=>setEmail(e.target.value)}/></div>
            <button className="btn btn-primary" type="submit" disabled={submitting}>{submitting?"Adding…":"Join waitlist"}</button>
          </form>
        )}
      </div>
    </div>
  );
}

// ─── NOT FOUND ────────────────────────────────────────────────────────────────
function NotFound({ navigate }) {
  return (
    <div style={{textAlign:"center",padding:"80px 24px"}}>
      <div className="font-display" style={{fontSize:80,fontWeight:800,color:"rgba(0,224,122,0.15)",lineHeight:1}}>404</div>
      <div className="font-display" style={{fontSize:24,fontWeight:700,marginTop:8,marginBottom:8}}>Page not found</div>
      <div style={{color:"var(--fg2)",marginBottom:28,fontSize:14}}>That route doesn't exist.</div>
      <button className="btn btn-primary" onClick={()=>navigate("/")}>Back to Home</button>
    </div>
  );
}

// ─── APP ──────────────────────────────────────────────────────────────────────
function App() {
  const { path, navigate } = useRouter();

  const renderPage = () => {
    if(path === "/") return <Home navigate={navigate}/>;
    if(path === "/dashboard") return <Dashboard navigate={navigate}/>;
    if(path.startsWith("/interview/")) return <Interview navigate={navigate} pathId={path.replace("/interview/","")}/>;
    if(path === "/record") return <Record navigate={navigate}/>;
    if(path.startsWith("/report/")) return <Report navigate={navigate} pathId={path.replace("/report/","")}/>;
    if(path === "/about") return <About/>;
    if(path === "/contact") return <Contact/>;
    if(path === "/login") return <Login/>;
    return <NotFound navigate={navigate}/>;
  };

  return (
    <>
      <Navbar path={path} navigate={navigate}/>
      <main style={{flex:1}}>{renderPage()}</main>
      <Toaster/>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
